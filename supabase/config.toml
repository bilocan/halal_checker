# Supabase CLI config (deploy + local Docker stack).
# UI E2E: scripts/start_e2e_supabase.* then supabase functions serve — see TESTING.md.

project_id = "halal-scna-local"   # replace with your actual project ref

[api]
enabled = true
port = 54321
schemas = ["public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
jwt_expiry = 3600
enable_signup = true

[functions.lookup-product]
verify_jwt = false   # anon callers (your app) don't need a JWT
# Env for `supabase functions serve` / hosted secrets (not keys in this file):
#   GEMINI_LOOKUP_EMPTY_OFF=true — dev override; prod: superadmin Admin → Settings (app_config)
