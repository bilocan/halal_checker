name: Deploy iOS to App Store

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      version:
        description: 'Optional — verify tag matches pubspec marketing version (pubspec is source of truth)'
        required: false
        type: string
      skip_testflight:
        description: 'Build only — skip TestFlight upload and Supabase version update'
        required: false
        type: boolean
        default: false

# ──────────────────────────────────────────────────────────────────────────────
# Triggers:
#   • Tag push (v*.*.*)  — full pipeline: build → TestFlight → review → release
#   • workflow_dispatch   — manual run from Actions tab for testing without a tag
#       version:          optional check only; marketing version always from pubspec.yaml
#       build number:     max App Store Connect build for that version + 1
#       skip_testflight:  optional, skip upload/review/release gates (build only)
#
# Gate structure (each environment requires a manual approval in GitHub Actions):
#
#  [tag push / dispatch] → build-and-upload (auto)
#                            └─ appstore/submit-review  → Gate 1: test on TestFlight, then submit
#                                  └─ appstore/release  → Gate 2: Apple approved — release
#
# One-time setup required:
#
#   GitHub → Settings → Environments — create these two environments and add
#   yourself as a required reviewer on each:
#     appstore/submit-review
#     appstore/release
#
#   GitHub → Settings → Secrets → Actions — add these secrets:
#     IOS_DISTRIBUTION_CERT_BASE64      base64 of your Distribution .p12 certificate
#                                        base64 -i cert.p12 | pbcopy
#     IOS_DISTRIBUTION_CERT_PASSWORD    (optional) password used when exporting the .p12
#                                        leave unset if the cert has no password
#     IOS_PROVISIONING_PROFILE_BASE64   base64 of your App Store provisioning profile
#                                        base64 -i "HalalScan.mobileprovision" | pbcopy
#     APPLE_TEAM_ID                     10-character team ID (e.g. AB12CD34EF)
#     APP_STORE_CONNECT_KEY_ID          API key ID from App Store Connect
#     APP_STORE_CONNECT_ISSUER_ID       Issuer ID from App Store Connect
#     APP_STORE_CONNECT_KEY_BASE64      base64 of the .p8 API key file
#                                        base64 -i AuthKey_XXXXXX.p8 | pbcopy
#
#   Also needed (shared with Android):
#     SUPABASE_URL, SUPABASE_ANON_KEY, GOOGLE_WEB_CLIENT_ID, GOOGLE_IOS_CLIENT_ID
#
#   App Store Connect prerequisite:
#     Create the app (bundle ID: app.halalscan) and fill in all metadata
#     (screenshots, description, etc.) before approving Gate 1. Gate 1 auto-creates
#     the target version; stale Prepare-for-Submission drafts are expired on
#     TestFlight and removed via API before create (see cancel-beta-review expire).
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Automated: sign, build, upload to TestFlight ───────────────────────────
  build-and-upload:
    runs-on: macos-latest
    outputs:
      version-name: ${{ steps.version.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate required secrets
        env:
          IOS_DISTRIBUTION_CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GOOGLE_IOS_CLIENT_ID: ${{ secrets.GOOGLE_IOS_CLIENT_ID }}
        run: |
          missing=()
          for secret in \
            IOS_DISTRIBUTION_CERT_BASE64 \
            IOS_PROVISIONING_PROFILE_BASE64 \
            APPLE_TEAM_ID \
            APP_STORE_CONNECT_KEY_ID \
            APP_STORE_CONNECT_ISSUER_ID \
            APP_STORE_CONNECT_KEY_BASE64 \
            SUPABASE_URL \
            SUPABASE_ANON_KEY \
            GOOGLE_WEB_CLIENT_ID \
            GOOGLE_IOS_CLIENT_ID; do
            if [ -z "${!secret}" ]; then
              missing+=("$secret")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::Missing required secrets: ${missing[*]}"
            echo ""
            echo "Add them at: GitHub → Settings → Secrets and variables → Actions"
            exit 1
          fi
          echo "All required secrets are set."

      - name: Select latest Xcode
        run: |
          LATEST_XCODE=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Selecting: $LATEST_XCODE"
          sudo xcode-select -s "$LATEST_XCODE/Contents/Developer"
          xcodebuild -version

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Import distribution certificate
        env:
          CERT_BASE64: ${{ secrets.IOS_DISTRIBUTION_CERT_BASE64 }}
          CERT_PASSWORD: ${{ secrets.IOS_DISTRIBUTION_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN_PATH="$RUNNER_TEMP/ios-build.keychain"
          CERT_PATH="$RUNNER_TEMP/dist.p12"

          # Decode the base64 certificate
          printf '%s' "$CERT_BASE64" | base64 --decode > "$CERT_PATH"

          # Validate decoded file
          CERT_SIZE=$(wc -c < "$CERT_PATH" | tr -d ' ')
          echo "Decoded certificate: $CERT_SIZE bytes"
          if [ "$CERT_SIZE" -lt 100 ]; then
            echo "::error::Decoded certificate is too small ($CERT_SIZE bytes) — likely invalid."
            echo "::error::Re-export your .p12 and update the secret. See instructions below."
            echo "Generate with: base64 -i YourCert.p12 | pbcopy"
            exit 1
          fi
          echo "File type: $(file -b "$CERT_PATH")"

          # Create and configure keychain
          security create-keychain -p "" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "" "$KEYCHAIN_PATH"

          # Try direct import first
          if security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
               -P "${CERT_PASSWORD:-}" -T /usr/bin/codesign 2>/dev/null; then
            echo "Certificate imported successfully."
          else
            echo "Direct import failed — attempting OpenSSL re-encoding for compatibility..."
            # Re-encode .p12 to strip newer PBES2/AES-256 encryption that macOS
            # Security framework cannot parse (common with OpenSSL 3.x exports)
            OPENSSL_BIN=$(/usr/bin/find /opt/homebrew/opt/openssl*/bin \
                          /usr/local/opt/openssl*/bin -name openssl 2>/dev/null | head -1 || true)
            OPENSSL_BIN="${OPENSSL_BIN:-openssl}"
            echo "Using OpenSSL: $("$OPENSSL_BIN" version 2>&1 || true)"

            if "$OPENSSL_BIN" pkcs12 -in "$CERT_PATH" -out "$RUNNER_TEMP/cert.pem" \
                 -nodes -passin "pass:${CERT_PASSWORD:-}" -legacy 2>/dev/null || \
               "$OPENSSL_BIN" pkcs12 -in "$CERT_PATH" -out "$RUNNER_TEMP/cert.pem" \
                 -nodes -passin "pass:${CERT_PASSWORD:-}" 2>/dev/null; then
              "$OPENSSL_BIN" pkcs12 -export -in "$RUNNER_TEMP/cert.pem" \
                -out "$CERT_PATH" -passout "pass:${CERT_PASSWORD:-}" \
                -legacy 2>/dev/null || \
              "$OPENSSL_BIN" pkcs12 -export -in "$RUNNER_TEMP/cert.pem" \
                -out "$CERT_PATH" -passout "pass:${CERT_PASSWORD:-}"
              rm -f "$RUNNER_TEMP/cert.pem"
              security import "$CERT_PATH" -k "$KEYCHAIN_PATH" \
                -P "${CERT_PASSWORD:-}" -T /usr/bin/codesign
              echo "Certificate imported after re-encoding."
            else
              echo "::error::Cannot parse the certificate as PKCS#12 (.p12)."
              echo "::error::Your secret appears to contain a DER certificate (.cer) without a private key."
              echo "::error::Code signing requires BOTH the certificate AND its private key in .p12 format."
              echo "::error::"
              echo "::error::To fix (on Linux):"
              echo "::error::  1. Generate a key+CSR: openssl req -newkey rsa:2048 -nodes -keyout ios.key -out ios.csr -subj '/CN=Distribution'"
              echo "::error::  2. Upload CSR at https://developer.apple.com/account/resources/certificates/add → Apple Distribution"
              echo "::error::  3. Download the .cer, then run:"
              echo "::error::     openssl x509 -inform DER -in distribution.cer -out cert.pem"
              echo "::error::     openssl pkcs12 -export -in cert.pem -inkey ios.key -out dist.p12 -passout pass:YOURPASS"
              echo "::error::     base64 -w 0 dist.p12   # copy output to IOS_DISTRIBUTION_CERT_BASE64"
              echo "::error::  4. Set IOS_DISTRIBUTION_CERT_PASSWORD to YOURPASS in GitHub secrets"
              exit 1
            fi
          fi

          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "" "$KEYCHAIN_PATH"

      - name: Install provisioning profile
        env:
          PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"
          UUID=$(security cms -D -i "$PROFILE_PATH" | plutil -extract UUID xml1 -o - - | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          echo "Profile UUID: $UUID"
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PROFILE_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$UUID".mobileprovision
          echo "PROFILE_UUID=$UUID" >> "$GITHUB_ENV"

      - name: Resolve version and build number
        id: version
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          set -euo pipefail
          pip install cryptography --quiet
          ARGS=""
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF_NAME#refs/tags/}"
            TAG="${TAG#v}"
            ARGS="--tag-version $TAG"
          elif [ -n "${{ inputs.version }}" ]; then
            ARGS="--tag-version ${{ inputs.version }}"
          fi
          python3 scripts/ci/ios_resolve_build_version.py $ARGS

      - name: Create ExportOptions.plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > ExportOptions.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>app-store</string>
              <key>teamID</key>
              <string>${APPLE_TEAM_ID}</string>
              <key>stripSwiftSymbols</key>
              <true/>
              <key>provisioningProfiles</key>
              <dict>
                  <key>app.halalscan</key>
                  <string>${PROFILE_UUID}</string>
              </dict>
          </dict>
          </plist>
          PLIST

      - name: Configure code signing
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Write signing settings to Release.xcconfig (only affects Runner target,
          # not CocoaPods targets which have their own xcconfig files)
          cat >> ios/Flutter/Release.xcconfig <<EOF
          CODE_SIGN_STYLE=Manual
          CODE_SIGN_IDENTITY=Apple Distribution
          DEVELOPMENT_TEAM=${APPLE_TEAM_ID}
          PROVISIONING_PROFILE_SPECIFIER=${PROFILE_UUID}
          EOF

      - name: Build IPA
        run: |
          flutter build ipa --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --export-options-plist=ExportOptions.plist \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }} \
            --dart-define=GOOGLE_IOS_CLIENT_ID=${{ secrets.GOOGLE_IOS_CLIENT_ID }}

      - name: Upload to TestFlight
        if: ${{ !(inputs.skip_testflight || false) }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_KEY_ID}.p8
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -1)
          echo "Uploading $IPA_PATH"
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" \
            --output-format json

      - name: Submit for beta review (external testers)
        if: ${{ !(inputs.skip_testflight || false) }}
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          VERSION_NAME: ${{ steps.version.outputs.name }}
        run: |
          set -euo pipefail
          pip install cryptography --quiet 2>/dev/null

          KEY_FILE=$(mktemp /tmp/authkey.XXXXXX.p8)
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_FILE"

          JWT=$(KEY_FILE="$KEY_FILE" python3 - <<'PYEOF'
          import json, time, base64, os
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          key_id = os.environ['APP_STORE_CONNECT_KEY_ID']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          with open(os.environ['KEY_FILE'], 'rb') as f:
              pk = serialization.load_pem_private_key(f.read(), password=None)
          now = int(time.time())
          def b64u(d): return base64.urlsafe_b64encode(d if isinstance(d, bytes) else d.encode()).rstrip(b'=').decode()
          h = b64u(json.dumps({'alg':'ES256','kid':key_id,'typ':'JWT'}, separators=(',',':')))
          p = b64u(json.dumps({'iss':issuer_id,'iat':now,'exp':now+1200,'aud':'appstoreconnect-v1'}, separators=(',',':')))
          msg = f'{h}.{p}'
          r, s = decode_dss_signature(pk.sign(msg.encode(), ec.ECDSA(hashes.SHA256())))
          print(f'{msg}.{b64u(r.to_bytes(32,"big")+s.to_bytes(32,"big"))}')
          PYEOF
          )
          rm -f "$KEY_FILE"

          # Wait for Apple to process the build (can take a few minutes).
          # Filter by this release's version so a VALID build from a previous
          # deployment is never mistaken for the newly uploaded one.
          echo "Waiting for v$VERSION_NAME build to be processed by App Store Connect..."
          APP_ID=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=app.halalscan" \
            | jq -r '.data[0].id')

          # Poll until the build for this exact version appears as VALID (up to 5 minutes).
          BUILD_ID=""
          for i in $(seq 1 30); do
            BUILD_ID=$(curl -gsS \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&filter[preReleaseVersion.version]=$VERSION_NAME&filter[processingState]=VALID&sort=-uploadedDate&limit=1" \
              | jq -r '.data[0].id // empty')
            if [ -n "$BUILD_ID" ]; then
              echo "Build $BUILD_ID for v$VERSION_NAME is ready."
              break
            fi
            echo "Waiting for v$VERSION_NAME build to be processed... (attempt $i/30)"
            sleep 10
          done

          if [ -z "$BUILD_ID" ]; then
            echo "::warning::Could not find processed build. Beta review submission skipped."
            exit 0
          fi

          # Submit for beta app review
          RESPONSE=$(curl -gsS -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"betaAppReviewSubmissions\",\"relationships\":{\"build\":{\"data\":{\"type\":\"builds\",\"id\":\"$BUILD_ID\"}}}}}" \
            "https://api.appstoreconnect.apple.com/v1/betaAppReviewSubmissions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Build submitted for beta app review (external testers)."
          elif echo "$BODY" | grep -q "ALREADY_EXISTS\|CONFLICT"; then
            echo "::warning::Build already submitted for beta review. Skipping."
          else
            echo "::warning::Beta review submission returned HTTP $HTTP_CODE (non-fatal):"
            echo "$BODY" | jq '.errors[0].detail' 2>/dev/null || echo "$BODY"
          fi

      - name: Save IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-ipa
          path: build/ios/ipa/*.ipa
          retention-days: 30

      - name: Update latest_version in Supabase
        if: ${{ !(inputs.skip_testflight || false) }}
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.name }}"
          curl -sS --fail-with-body -X PATCH \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$VERSION\"}" \
            "$SUPABASE_URL/rest/v1/app_config?key=eq.latest_version"
          echo "Set latest_version to $VERSION in Supabase."

  # ── Gate 1: Submit for App Store review ────────────────────────────────────
  # Test the build on TestFlight first, then approve this gate to submit for
  # App Store review. The app version must be in "Prepare for Submission" state
  # in App Store Connect (metadata and screenshots filled in).
  submit-review:
    needs: build-and-upload
    if: ${{ !(inputs.skip_testflight || false) }}
    runs-on: ubuntu-latest
    environment: appstore/submit-review
    steps:
      - uses: actions/checkout@v4

      - name: Ensure App Store version exists
        id: ensure-version
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          set -euo pipefail
          pip install cryptography --quiet 2>/dev/null

          VERSION="${{ needs.build-and-upload.outputs.version-name }}"
          KEY_FILE=$(mktemp /tmp/authkey.XXXXXX.p8)
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_FILE"

          JWT=$(KEY_FILE="$KEY_FILE" python3 - <<'PYEOF'
          import json, time, base64, os
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          key_id = os.environ['APP_STORE_CONNECT_KEY_ID']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          with open(os.environ['KEY_FILE'], 'rb') as f:
              pk = serialization.load_pem_private_key(f.read(), password=None)
          now = int(time.time())
          def b64u(d): return base64.urlsafe_b64encode(d if isinstance(d, bytes) else d.encode()).rstrip(b'=').decode()
          h = b64u(json.dumps({'alg':'ES256','kid':key_id,'typ':'JWT'}, separators=(',',':')))
          p = b64u(json.dumps({'iss':issuer_id,'iat':now,'exp':now+1200,'aud':'appstoreconnect-v1'}, separators=(',',':')))
          msg = f'{h}.{p}'
          r, s = decode_dss_signature(pk.sign(msg.encode(), ec.ECDSA(hashes.SHA256())))
          print(f'{msg}.{b64u(r.to_bytes(32,"big")+s.to_bytes(32,"big"))}')
          PYEOF
          )
          rm -f "$KEY_FILE"

          list_versions() {
            curl -gsS -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&limit=20" \
              | jq '.data[] | {id: .id, version: .attributes.versionString, state: .attributes.appStoreState}'
          }

          fetch_version_id() {
            curl -gsS --fail-with-body \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&filter[versionString]=$VERSION&limit=1" \
              | jq -r '.data[0].id // empty'
          }

          clear_stale_prepare_versions() {
            local stale_versions stale_ids stale_id stale_ver
            stale_versions=$(curl -gsS --fail-with-body \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&filter[appStoreState]=PREPARE_FOR_SUBMISSION&limit=20" \
              | jq -r --arg target "$VERSION" \
                '[.data[] | select(.attributes.versionString != $target) | .attributes.versionString] | join(",")')
            if [ -z "$stale_versions" ]; then
              return 0
            fi
            echo "Clearing stale Prepare for Submission versions: $stale_versions"
            JWT="$JWT" APP_ID="$APP_ID" bash scripts/ci/expire_testflight_versions.sh "$stale_versions"

            stale_ids=$(curl -gsS --fail-with-body \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&filter[appStoreState]=PREPARE_FOR_SUBMISSION&limit=20" \
              | jq -r --arg target "$VERSION" '.data[] | select(.attributes.versionString != $target) | .id')
            while IFS= read -r stale_id; do
              [ -n "$stale_id" ] || continue
              stale_ver=$(curl -gsS --fail-with-body \
                -H "Authorization: Bearer $JWT" \
                "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$stale_id" \
                | jq -r '.data.attributes.versionString // empty')
              echo "Deleting App Store version $stale_ver (ID: $stale_id)..."
              DELETE_HTTP=$(curl -sS -o /dev/null -w "%{http_code}" -X DELETE \
                -H "Authorization: Bearer $JWT" \
                "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$stale_id")
              if [ "$DELETE_HTTP" = "204" ] || [ "$DELETE_HTTP" = "200" ]; then
                echo "Deleted App Store version $stale_ver."
              else
                echo "::warning::Could not delete App Store version $stale_ver (HTTP $DELETE_HTTP)."
              fi
            done <<< "$stale_ids"
          }

          create_app_store_version() {
            echo "Creating App Store version $VERSION..." >&2
            CREATE_RESP=$(curl -gsS -w "\n%{http_code}" \
              -X POST \
              -H "Authorization: Bearer $JWT" \
              -H "Content-Type: application/json" \
              -d "{\"data\":{\"type\":\"appStoreVersions\",\"attributes\":{\"platform\":\"IOS\",\"versionString\":\"$VERSION\",\"releaseType\":\"MANUAL\"},\"relationships\":{\"app\":{\"data\":{\"type\":\"apps\",\"id\":\"$APP_ID\"}}}}}" \
              "https://api.appstoreconnect.apple.com/v1/appStoreVersions")
            CREATE_HTTP=$(echo "$CREATE_RESP" | tail -1)
            CREATE_BODY=$(echo "$CREATE_RESP" | sed '$d')
            printf '%s\n' "$CREATE_HTTP"
            printf '%s\n' "$CREATE_BODY"
          }

          APP_ID=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=app.halalscan" \
            | jq -r '.data[0].id')

          VERSION_ID=$(fetch_version_id)
          if [ -n "$VERSION_ID" ]; then
            VERSION_STATE=$(curl -gsS --fail-with-body \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$VERSION_ID" \
              | jq -r '.data.attributes.appStoreState // empty')
            echo "Version $VERSION already exists in state: $VERSION_STATE (ID: $VERSION_ID)"
          else
            clear_stale_prepare_versions

            CREATE_RESULT=$(create_app_store_version)
            CREATE_HTTP=$(echo "$CREATE_RESULT" | head -1)
            CREATE_BODY=$(echo "$CREATE_RESULT" | tail -n +2 | head -1)
            if [ "$CREATE_HTTP" -ge 400 ]; then
              echo "Create failed (HTTP $CREATE_HTTP) — clearing stale versions and retrying..."
              echo "$CREATE_BODY" | jq '.errors[] | {code, detail, title}' 2>/dev/null || echo "$CREATE_BODY"
              clear_stale_prepare_versions
              sleep 3
              CREATE_RESULT=$(create_app_store_version)
              CREATE_HTTP=$(echo "$CREATE_RESULT" | head -1)
              CREATE_BODY=$(echo "$CREATE_RESULT" | tail -n +2 | head -1)
            fi
            if [ "$CREATE_HTTP" -ge 400 ]; then
              echo "::error::Could not create App Store version $VERSION (HTTP $CREATE_HTTP):"
              echo "$CREATE_BODY" | jq '.errors[] | {code, detail, title}' 2>/dev/null || echo "$CREATE_BODY"
              echo "Current iOS App Store versions:"
              list_versions
              exit 1
            fi
            VERSION_ID=$(echo "$CREATE_BODY" | jq -r '.data.id // empty')
            echo "Created App Store version $VERSION (ID: $VERSION_ID)."

            # ASC can take a moment to index a newly created version.
            if [ -z "$VERSION_ID" ]; then
              for i in $(seq 1 12); do
                VERSION_ID=$(fetch_version_id)
                if [ -n "$VERSION_ID" ]; then
                  echo "Resolved version ID after create (attempt $i)."
                  break
                fi
                echo "Waiting for version $VERSION to appear... (attempt $i/12)"
                sleep 5
              done
            fi
          fi

          if [ -z "$VERSION_ID" ]; then
            echo "::error::App Store version $VERSION not found after ensure step."
            list_versions
            exit 1
          fi

          echo "version_id=$VERSION_ID" >> "$GITHUB_OUTPUT"

      - name: Link build to App Store version
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          set -euo pipefail
          pip install cryptography --quiet 2>/dev/null

          VERSION="${{ needs.build-and-upload.outputs.version-name }}"
          KEY_FILE=$(mktemp /tmp/authkey.XXXXXX.p8)
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_FILE"

          JWT=$(KEY_FILE="$KEY_FILE" python3 - <<'PYEOF'
          import json, time, base64, os
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          key_id = os.environ['APP_STORE_CONNECT_KEY_ID']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          with open(os.environ['KEY_FILE'], 'rb') as f:
              pk = serialization.load_pem_private_key(f.read(), password=None)
          now = int(time.time())
          def b64u(d): return base64.urlsafe_b64encode(d if isinstance(d, bytes) else d.encode()).rstrip(b'=').decode()
          h = b64u(json.dumps({'alg':'ES256','kid':key_id,'typ':'JWT'}, separators=(',',':')))
          p = b64u(json.dumps({'iss':issuer_id,'iat':now,'exp':now+1200,'aud':'appstoreconnect-v1'}, separators=(',',':')))
          msg = f'{h}.{p}'
          r, s = decode_dss_signature(pk.sign(msg.encode(), ec.ECDSA(hashes.SHA256())))
          print(f'{msg}.{b64u(r.to_bytes(32,"big")+s.to_bytes(32,"big"))}')
          PYEOF
          )
          rm -f "$KEY_FILE"

          APP_ID=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=app.halalscan" \
            | jq -r '.data[0].id')

          VERSION_ID="${{ steps.ensure-version.outputs.version_id }}"
          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            VERSION_ID=$(curl -gsS --fail-with-body \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&filter[versionString]=$VERSION&limit=1" \
              | jq -r '.data[0].id // empty')
          fi

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            echo "::error::App Store version $VERSION not found — cannot link build."
            echo "Create version $VERSION in App Store Connect (Prepare for Submission), or check the ensure-version step logs."
            curl -gsS -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&limit=20" \
              | jq '.data[] | {id: .id, version: .attributes.versionString, state: .attributes.appStoreState}'
            exit 1
          fi

          # Build had plenty of time to process during Gate 1 manual approval; poll
          # briefly just in case.
          BUILD_ID=""
          for i in $(seq 1 10); do
            BUILD_ID=$(curl -gsS \
              -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/builds?filter[app]=$APP_ID&filter[preReleaseVersion.version]=$VERSION&filter[processingState]=VALID&sort=-uploadedDate&limit=1" \
              | jq -r '.data[0].id // empty')
            if [ -n "$BUILD_ID" ]; then
              echo "Found valid build $BUILD_ID for v$VERSION."
              break
            fi
            echo "Waiting for valid build... (attempt $i/10)"
            sleep 15
          done

          if [ -z "$BUILD_ID" ]; then
            echo "::error::No valid build found for v$VERSION. Upload to TestFlight may have failed."
            exit 1
          fi

          PATCH_RESP=$(curl -gsS -w "\n%{http_code}" \
            -X PATCH \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"appStoreVersions\",\"id\":\"$VERSION_ID\",\"relationships\":{\"build\":{\"data\":{\"type\":\"builds\",\"id\":\"$BUILD_ID\"}}}}}" \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersions/$VERSION_ID")
          PATCH_HTTP=$(echo "$PATCH_RESP" | tail -1)
          PATCH_BODY=$(echo "$PATCH_RESP" | sed '$d')

          if [ "$PATCH_HTTP" -ge 200 ] && [ "$PATCH_HTTP" -lt 300 ]; then
            echo "Build $BUILD_ID linked to App Store version $VERSION."
          else
            echo "::error::Failed to link build to App Store version (HTTP $PATCH_HTTP):"
            echo "$PATCH_BODY"
            exit 1
          fi

      - name: Upload App Store What's New
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
        run: |
          VERSION="${{ needs.build-and-upload.outputs.version-name }}"
          bash ./scripts/linux/upload_appstore_whatsnew.sh "$VERSION" || true

      - name: Submit for App Store review
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          VERSION: ${{ needs.build-and-upload.outputs.version-name }}
        run: |
          set -euo pipefail
          pip install cryptography --quiet

          KEY_FILE=$(mktemp /tmp/authkey.XXXXXX.p8)
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_FILE"

          JWT=$(KEY_FILE="$KEY_FILE" python3 - <<'PYEOF'
          import json, time, base64, os
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          key_id = os.environ['APP_STORE_CONNECT_KEY_ID']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          with open(os.environ['KEY_FILE'], 'rb') as f:
              pk = serialization.load_pem_private_key(f.read(), password=None)
          now = int(time.time())
          def b64u(d): return base64.urlsafe_b64encode(d if isinstance(d, bytes) else d.encode()).rstrip(b'=').decode()
          h = b64u(json.dumps({'alg':'ES256','kid':key_id,'typ':'JWT'}, separators=(',',':')))
          p = b64u(json.dumps({'iss':issuer_id,'iat':now,'exp':now+1200,'aud':'appstoreconnect-v1'}, separators=(',',':')))
          msg = f'{h}.{p}'
          r, s = decode_dss_signature(pk.sign(msg.encode(), ec.ECDSA(hashes.SHA256())))
          print(f'{msg}.{b64u(r.to_bytes(32,"big")+s.to_bytes(32,"big"))}')
          PYEOF
          )
          rm -f "$KEY_FILE"

          APP_ID=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=app.halalscan" \
            | jq -r '.data[0].id')
          echo "App ID: $APP_ID"

          # Fetch all states for this version so we can distinguish
          # "doesn't exist" from "exists but not editable".
          VERSION_JSON=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&filter[versionString]=$VERSION")

          # Version was created (or already existed) in the previous step.
          # Find it — accept any state so we can detect already-submitted versions.
          VERSION_ID=$(echo "$VERSION_JSON" | jq -r \
            '.data[] | select(.attributes.appStoreState | test("PREPARE_FOR_SUBMISSION|REJECTED|DEVELOPER_REJECTED")) | .id' \
            | head -1)
          VERSION_STATE=$(echo "$VERSION_JSON" | jq -r '.data[0].attributes.appStoreState // empty')

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            # Version exists but is already past the editable stage.
            VERSION_ID=$(echo "$VERSION_JSON" | jq -r '.data[0].id')
            echo "::warning::Version $VERSION exists in state $VERSION_STATE — already submitted or approved. Skipping submission."
            exit 0
          fi

          echo "Found version $VERSION in state $VERSION_STATE (ID: $VERSION_ID)"

          RESPONSE=$(curl -gsS -w "\n%{http_code}" \
            -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"appStoreVersionSubmissions\",\"relationships\":{\"appStoreVersion\":{\"data\":{\"type\":\"appStoreVersions\",\"id\":\"$VERSION_ID\"}}}}}" \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersionSubmissions")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "Submitted version $VERSION for App Store review."
          elif echo "$BODY" | grep -q "FORBIDDEN_ERROR"; then
            echo "::warning::Version $VERSION is already submitted or in a state that doesn't allow submission. Skipping."
            echo "$BODY" | jq '.errors[0].detail' 2>/dev/null || true
          else
            echo "::error::Failed to submit for review (HTTP $HTTP_CODE):"
            echo "$BODY"
            exit 1
          fi

  # ── Gate 2: Release to App Store ───────────────────────────────────────────
  # Approve once Apple approves the review. The version must be in
  # "Pending Developer Release" state (requires manual release to be enabled
  # in App Store Connect for this version).
  release:
    needs: [build-and-upload, submit-review]
    if: ${{ !(inputs.skip_testflight || false) }}
    runs-on: ubuntu-latest
    environment: appstore/release
    steps:
      - name: Release to App Store
        env:
          APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          VERSION: ${{ needs.build-and-upload.outputs.version-name }}
        run: |
          set -euo pipefail
          pip install cryptography --quiet

          KEY_FILE=$(mktemp /tmp/authkey.XXXXXX.p8)
          echo "$APP_STORE_CONNECT_KEY_BASE64" | base64 --decode > "$KEY_FILE"

          JWT=$(KEY_FILE="$KEY_FILE" python3 - <<'PYEOF'
          import json, time, base64, os
          from cryptography.hazmat.primitives import hashes, serialization
          from cryptography.hazmat.primitives.asymmetric import ec
          from cryptography.hazmat.primitives.asymmetric.utils import decode_dss_signature
          key_id = os.environ['APP_STORE_CONNECT_KEY_ID']
          issuer_id = os.environ['APP_STORE_CONNECT_ISSUER_ID']
          with open(os.environ['KEY_FILE'], 'rb') as f:
              pk = serialization.load_pem_private_key(f.read(), password=None)
          now = int(time.time())
          def b64u(d): return base64.urlsafe_b64encode(d if isinstance(d, bytes) else d.encode()).rstrip(b'=').decode()
          h = b64u(json.dumps({'alg':'ES256','kid':key_id,'typ':'JWT'}, separators=(',',':')))
          p = b64u(json.dumps({'iss':issuer_id,'iat':now,'exp':now+1200,'aud':'appstoreconnect-v1'}, separators=(',',':')))
          msg = f'{h}.{p}'
          r, s = decode_dss_signature(pk.sign(msg.encode(), ec.ECDSA(hashes.SHA256())))
          print(f'{msg}.{b64u(r.to_bytes(32,"big")+s.to_bytes(32,"big"))}')
          PYEOF
          )
          rm -f "$KEY_FILE"

          APP_ID=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps?filter[bundleId]=app.halalscan" \
            | jq -r '.data[0].id')

          VERSION_ID=$(curl -gsS --fail-with-body \
            -H "Authorization: Bearer $JWT" \
            "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS&filter[appStoreState]=PENDING_DEVELOPER_RELEASE&filter[versionString]=$VERSION" \
            | jq -r '.data[0].id')

          if [ -z "$VERSION_ID" ] || [ "$VERSION_ID" = "null" ]; then
            echo "::warning::No version in PENDING_DEVELOPER_RELEASE state. Skipping release."
            echo "Current versions:"
            curl -gsS -H "Authorization: Bearer $JWT" \
              "https://api.appstoreconnect.apple.com/v1/apps/$APP_ID/appStoreVersions?filter[platform]=IOS" \
              | jq '.data[] | {id: .id, version: .attributes.versionString, state: .attributes.appStoreState}'
            echo "This step only runs after Apple approves the review."
            exit 0
          fi

          curl -sS --fail-with-body \
            -X POST \
            -H "Authorization: Bearer $JWT" \
            -H "Content-Type: application/json" \
            -d "{\"data\":{\"type\":\"appStoreVersionReleaseRequests\",\"relationships\":{\"appStoreVersion\":{\"data\":{\"type\":\"appStoreVersions\",\"id\":\"$VERSION_ID\"}}}}}" \
            "https://api.appstoreconnect.apple.com/v1/appStoreVersionReleaseRequests"
          echo "Released version $VERSION to App Store."

