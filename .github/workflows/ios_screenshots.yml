name: iOS App Store Screenshots

on:
  workflow_dispatch:  # Manual trigger from GitHub UI
    inputs:
      flutter_version:
        description: 'Flutter version (leave blank for latest stable)'
        required: false
        default: ''

jobs:
  screenshots:
    runs-on: macos-latest

    strategy:
      matrix:
        device:
          - name: "iPhone 16 Pro Max"
            slug: "iphone-16-pro-max"
            udid_hint: "iPhone 16 Pro Max"
          - name: "iPhone 14 Plus"
            slug: "iphone-14-plus"
            udid_hint: "iPhone 14 Plus"
          - name: "iPhone SE (3rd generation)"
            slug: "iphone-se-3rd"
            udid_hint: "iPhone SE (3rd generation)"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Create dart defines
        run: |
          cat > dart_defines.json << 'EOF'
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GOOGLE_WEB_CLIENT_ID": "${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Get available simulators
        run: xcrun simctl list devices available

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "${{ matrix.device.udid_hint }}" | head -1 | grep -E -o '[0-9A-F-]{36}')
          if [ -z "$UDID" ]; then
            echo "Error: Could not find simulator for ${{ matrix.device.name }}"
            xcrun simctl list devices available
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "Booted: ${{ matrix.device.name }} ($UDID)"

      - name: Build Flutter app for simulator
        run: flutter build ios --simulator --no-codesign --dart-define-from-file=dart_defines.json

      - name: Install app on simulator
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" | head -1)
          echo "Installing: $APP_PATH"
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"

      - name: Launch app and wait for it to load
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" | head -1)
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Bundle ID: $BUNDLE_ID"
          echo "BUNDLE_ID=$BUNDLE_ID" >> $GITHUB_ENV
          xcrun simctl launch "$SIMULATOR_UDID" "$BUNDLE_ID"
          sleep 5  # Wait for app to fully load

      - name: Take screenshots
        run: |
          mkdir -p "screenshots/${{ matrix.device.slug }}"

          # Screenshot 1 - initial screen (already open)
          xcrun simctl io "$SIMULATOR_UDID" screenshot "screenshots/${{ matrix.device.slug }}/01_home.png"
          sleep 2

          # Add more navigation steps here if needed, e.g.:
          # xcrun simctl io "$SIMULATOR_UDID" screenshot "screenshots/${{ matrix.device.slug }}/02_feature.png"

      - name: Upload screenshots as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device.slug }}
          path: screenshots/
          retention-days: 30
