name: iOS App Store Screenshots

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version (leave blank for latest stable)'
        required: false
        default: ''

jobs:
  screenshots:
    runs-on: macos-latest

    strategy:
      matrix:
        device:
          - name: "iPhone 16 Pro Max"
            slug: "iphone-16-pro-max"
            udid_hint: "iPhone 16 Pro Max"
          - name: "iPhone 14 Plus"
            slug: "iphone-14-plus"
            udid_hint: "iPhone 14 Plus"
          - name: "iPhone SE (3rd generation)"
            slug: "iphone-se-3rd"
            udid_hint: "iPhone SE (3rd generation)"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Create dart defines
        run: |
          cat > dart_defines.json << 'EOF'
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GOOGLE_WEB_CLIENT_ID": "${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Get available simulators
        run: xcrun simctl list devices available

      - name: Boot simulator
        run: |
          UDID=$(xcrun simctl list devices available | grep "${{ matrix.device.udid_hint }}" | head -1 | grep -E -o '[0-9A-F-]{36}')
          if [ -z "$UDID" ]; then
            echo "Error: Could not find simulator for ${{ matrix.device.name }}"
            xcrun simctl list devices available
            exit 1
          fi
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "Booted: ${{ matrix.device.name }} ($UDID)"

      - name: Take screenshots
        run: |
          flutter drive \
            --driver=test_driver/integration_test.dart \
            --target=integration_test/screenshots_test.dart \
            -d "$SIMULATOR_UDID" \
            --dart-define-from-file=dart_defines.json

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device.slug }}
          path: screenshots/
          retention-days: 30
