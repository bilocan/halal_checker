name: iOS App Store Screenshots

# Simulator builds need CocoaPods + x86_64 sim (Rosetta). google_mlkit_* pods exclude
# arm64 for iphonesimulator; Flutter 3.41+ on Xcode 26 (arm-only sims) then fails with
# "Framework 'Pods_Runner' not found". Pin Xcode 16 + Flutter 3.38.x unless you know
# your deps support arm64 simulator (see flutter/flutter#182748).

on:
  workflow_dispatch:
    inputs:
      flutter_version:
        description: 'Flutter version (default 3.38.5 — required for ML Kit + simulator CI)'
        required: false
        default: '3.38.5'

jobs:
  screenshots:
    runs-on: macos-latest
    timeout-minutes: 45

    strategy:
      matrix:
        device:
          - name: "iPhone 16 Pro Max"
            slug: "iphone-16-pro-max"
            udid_hint: "iPhone 16 Pro Max"
          - name: "iPhone 14 Plus"
            slug: "iphone-14-plus"
            udid_hint: "iPhone 14 Plus"
          - name: "iPhone SE (3rd generation)"
            slug: "iphone-se-3rd"
            udid_hint: "iPhone SE (3rd generation)"
          - name: "iPad Pro 13-inch (M4)"
            slug: "ipad-pro-13-m4"
            udid_hint: "iPad Pro 13-inch (M4)"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Do not use "latest" Xcode on GHA: Xcode 26 simulators are arm64-only while ML Kit
      # forces EXCLUDED_ARCHS=arm64 for simulator, breaking the Pods_Runner link step.
      - name: Select Xcode 16
        run: |
          set -euo pipefail
          XCODE_16=$(ls -d /Applications/Xcode_16*.app 2>/dev/null | sort -V | tail -1 || true)
          if [ -z "$XCODE_16" ]; then
            echo "::error::Xcode 16 not found on runner. google_mlkit_* cannot build for Xcode 26 arm-only simulators."
            ls -d /Applications/Xcode*.app 2>/dev/null || true
            exit 1
          fi
          sudo xcode-select -s "$XCODE_16/Contents/Developer"
          xcodebuild -version

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ inputs.flutter_version }}
          channel: 'stable'
          cache: true

      - name: Disable Swift Package Manager (iOS plugins use CocoaPods)
        run: flutter config --no-enable-swift-package-manager

      - name: Create dart defines
        run: |
          cat > dart_defines.json << 'EOF'
          {
            "SUPABASE_URL": "${{ secrets.SUPABASE_URL }}",
            "SUPABASE_ANON_KEY": "${{ secrets.SUPABASE_ANON_KEY }}",
            "GOOGLE_WEB_CLIENT_ID": "${{ secrets.GOOGLE_WEB_CLIENT_ID }}"
          }
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      - name: Build app for simulator
        run: |
          flutter build ios --simulator --no-codesign \
            --target=lib/main_screenshots.dart \
            --dart-define-from-file=dart_defines.json

      - name: Boot simulator
        run: |
          HINT="${{ matrix.device.udid_hint }}"
          DEVICE_TYPE=$(xcrun simctl list devicetypes --json | jq -r --arg hint "$HINT" '.devicetypes[] | select(.name | contains($hint)) | .identifier' | head -1)
          RUNTIME=$(xcrun simctl list runtimes --json | jq -r '[.runtimes[] | select(.name | startswith("iOS")) | select(.isAvailable == true)] | sort_by(.version) | last | .identifier')
          if [ -z "$DEVICE_TYPE" ] || [ -z "$RUNTIME" ]; then
            echo "Error: Cannot find device type or runtime for ${{ matrix.device.name }}"
            xcrun simctl list devicetypes | grep "$HINT" || true
            xcrun simctl list runtimes
            exit 1
          fi
          UDID=$(xcrun simctl create "${{ matrix.device.name }}-screenshots" "$DEVICE_TYPE" "$RUNTIME")
          echo "SIMULATOR_UDID=$UDID" >> $GITHUB_ENV
          xcrun simctl boot "$UDID"
          xcrun simctl bootstatus "$UDID" -b
          echo "Booted: ${{ matrix.device.name }} ($UDID)"
          echo "Waiting for simulator to settle..."
          sleep 30

      - name: Take screenshots
        run: |
          APP_PATH=$(find build/ios/iphonesimulator -name "*.app" | head -1)
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist")
          xcrun simctl install "$SIMULATOR_UDID" "$APP_PATH"
          xcrun simctl launch "$SIMULATOR_UDID" "$BUNDLE_ID"
          mkdir -p screenshots
          sleep 10  && xcrun simctl io "$SIMULATOR_UDID" screenshot "screenshots/01_start.png"
          sleep 15  && xcrun simctl io "$SIMULATOR_UDID" screenshot "screenshots/02_directory.png"
          sleep 15  && xcrun simctl io "$SIMULATOR_UDID" screenshot "screenshots/03_result_halal.png"
          sleep 15  && xcrun simctl io "$SIMULATOR_UDID" screenshot "screenshots/04_result_haram.png"

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        with:
          name: screenshots-${{ matrix.device.slug }}
          path: screenshots/
          retention-days: 30
