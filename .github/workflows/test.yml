name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  # ── Tests ────────────────────────────────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: ./scripts/linux/format_dart.sh --check

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test test/services/ test/constants/ test/models/ test/config_test.dart --coverage --reporter=github

      - name: Export built-in rules to JSON
        run: dart run tool/export_rules.dart keyword-rules.json

      - name: Upload rules to Supabase Storage
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
        run: |
          curl --fail-with-body -X POST \
            "${{ secrets.SUPABASE_URL }}/storage/v1/object/rules/keyword-rules.json" \
            -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
            -H "Content-Type: application/json" \
            -H "x-upsert: true" \
            --data-binary @keyword-rules.json

      - name: Install lcov
        run: sudo apt-get install -y lcov

      - name: Remove const-only files from coverage
        run: |
          lcov --remove coverage/lcov.info \
            '*/constants/food_categories.dart' \
            '*/constants/ingredient_keywords.dart' \
            '*/constants/ingredient_display_names.dart' \
            --output-file coverage/lcov.info --ignore-errors unused

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/lcov.info
          fail_ci_if_error: false

  # ── Android APK ──────────────────────────────────────────────────────────────
  build-android:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install CMake via SDK Manager
        run: yes | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.30.5"

      - name: Fix Android keystore directories
        run: |
          sudo mkdir -p /home/runner/.config/.android
          sudo chown -R runner:runner /home/runner/.config
          mkdir -p ~/.android

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK (split by ABI)
        run: |
          flutter build apk --release --split-per-abi \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 14

  # ── iOS ──────────────────────────────────────────────────────────────────────
  # TODO: add build-ios to required branch protection checks once iOS developer account is ready
  build-ios:
    needs: test
    if: github.event_name == 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS (no code signing)
        run: |
          flutter build ios --release --no-codesign \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}
