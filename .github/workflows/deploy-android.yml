name: Deploy Android to Google Play

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

# ──────────────────────────────────────────────────────────────────────────────
# Gate structure (each environment requires a manual approval in GitHub Actions):
#
#  [tag push] → build-and-draft (auto)
#                 └─ play/publish-internal  → Gate 1: review draft, publish to internal
#                       └─ play/promote-closed  → Gate 2: promote internal → closed testing
#                             └─ play/submit-review  → Gate 3: promote closed → open testing (triggers Google review)
#                                   └─ play/publish-test  → Gate 4: confirm review passed, release is live
#
# Setup required (GitHub → Settings → Environments):
#   Create these four environments and add yourself as a required reviewer on each:
#     play/publish-internal
#     play/promote-closed
#     play/submit-review
#     play/publish-test
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Automated: build + upload draft to internal ────────────────────────────
  build-and-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version-code: ${{ steps.version.outputs.code }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install CMake
        run: yes | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.30.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          {
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Extract version
        id: version
        run: |
          TAG_NAME="${GITHUB_REF_NAME#v}"
          if [ -z "$TAG_NAME" ]; then
            echo "ERROR: GITHUB_REF_NAME is empty — workflow must be triggered by a version tag" >&2
            exit 1
          fi
          echo "name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "code=$((100 + ${{ github.run_number }}))" >> $GITHUB_OUTPUT

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token

      - name: Upload draft to internal track
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: app.halalscan
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal
          status: draft

      - name: Save AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ── Gate 1: Publish on internal ────────────────────────────────────────────
  # Check the draft in Play Console, then approve this gate to publish it to
  # internal testers.
  publish-internal:
    needs: build-and-draft
    runs-on: ubuntu-latest
    environment: play/publish-internal
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Publish internal draft → completed
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')
          curl -sS --fail-with-body -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"releases\":[{\"versionCodes\":[\"$VC\"],\"status\":\"completed\"}]}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/internal"
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT:commit"
          echo "Internal release $VC published."

  # ── Gate 2: Promote to closed testing ──────────────────────────────────────
  # Approve when internal testers have validated the build.
  promote-closed:
    needs: [build-and-draft, publish-internal]
    runs-on: ubuntu-latest
    environment: play/promote-closed
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Promote internal → closed testing
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')
          curl -sS --fail-with-body -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"releases\":[{\"versionCodes\":[\"$VC\"],\"status\":\"completed\"}]}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/alpha"
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT:commit"
          echo "Promoted release $VC to closed testing."

  # ── Gate 3: Submit for Google Play review ──────────────────────────────────
  # Approve when ready to submit. Promotes to open testing and triggers
  # Google's review process. The release will go live on open testing
  # automatically once the review passes.
  submit-review:
    needs: [build-and-draft, promote-closed]
    runs-on: ubuntu-latest
    environment: play/submit-review
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Promote closed testing → open testing
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')
          curl -sS --fail-with-body -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"releases\":[{\"versionCodes\":[\"$VC\"],\"status\":\"completed\"}]}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/beta"
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT:commit"
          echo "Submitted release $VC to open testing for review."

  # ── Gate 4: Confirm release is live on open testing ────────────────────────
  # Approve this gate AFTER Play Console shows the review has passed.
  # The job verifies the open testing release is in "completed" state and
  # fails fast if the review is still pending — re-run it once it passes.
  publish-test:
    needs: [build-and-draft, submit-review]
    runs-on: ubuntu-latest
    environment: play/publish-test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Verify open testing release is live
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')
          STATUS=$(curl -sS --fail-with-body \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/beta" \
            | jq -r --argjson vc "$VC" \
              '.releases[] | select(.versionCodes[] | tonumber == $vc) | .status' \
            2>/dev/null || echo "not_found")
          # Discard edit — read-only check, nothing to commit
          curl -sS -X DELETE \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT" || true
          echo "Open testing release $VC status: $STATUS"
          if [ "$STATUS" != "completed" ]; then
            echo "::error::Release $VC is not yet live on open testing (status: $STATUS)." \
                 "Wait for Google's review to pass, then re-run this job."
            exit 1
          fi
          echo "Release $VC is live on open testing."
