name: Deploy Android to Google Play

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:

# ──────────────────────────────────────────────────────────────────────────────
# Gate structure (each environment requires a manual approval in GitHub Actions):
#
#  [tag push] → build-and-draft (auto)
#                 └─ play/publish-internal  → Gate 1: review draft, publish to internal
#                       └─ play/promote-closed  → Gate 2: promote internal → closed testing
#                             └─ play/submit-review  → Gate 3: promote closed → open testing (triggers Google review)
#                                   └─ play/publish-test  → Gate 4: confirm review passed, release is live
#
# Setup required (GitHub → Settings → Environments):
#   Create these four environments and add yourself as a required reviewer on each:
#     play/publish-internal
#     play/promote-closed
#     play/submit-review
#     play/publish-test
# ──────────────────────────────────────────────────────────────────────────────

jobs:

  # ── Automated: build AAB and save artifact ────────────────────────────────
  build-and-draft:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      version-code: ${{ steps.version.outputs.code }}
      version-name: ${{ steps.version.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install CMake
        run: yes | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager "cmake;3.30.5"

      - name: Install dependencies
        run: flutter pub get

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          {
            echo "storePassword=${{ secrets.KEYSTORE_PASSWORD }}"
            echo "keyPassword=${{ secrets.KEY_PASSWORD }}"
            echo "keyAlias=${{ secrets.KEY_ALIAS }}"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Resolve version
        id: version
        env:
          PLAY_ACCESS_TOKEN: ${{ steps.auth.outputs.access_token }}
        run: |
          ARGS=""
          if [ "${{ github.event_name }}" = "push" ]; then
            ARGS="--tag-version ${GITHUB_REF_NAME#v}"
          fi
          python3 scripts/ci/android_resolve_build_version.py $ARGS

      - name: Build App Bundle
        run: |
          flutter build appbundle --release \
            --build-name=${{ steps.version.outputs.name }} \
            --build-number=${{ steps.version.outputs.code }} \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=GOOGLE_WEB_CLIENT_ID=${{ secrets.GOOGLE_WEB_CLIENT_ID }}

      - name: Save AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # ── Gate 1: Upload and publish to internal testers ─────────────────────────
  # Approve this gate to upload the build and publish it to internal testers.
  # The AAB is uploaded exactly once here — no draft, no separate promotion step.
  publish-internal:
    needs: build-and-draft
    runs-on: ubuntu-latest
    environment: play/publish-internal
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Prepare Play Store What's New
        id: whatsnew
        run: |
          VERSION="${{ needs.build-and-draft.outputs.version-name }}"
          DIR=$(bash ./scripts/linux/prepare_store_whatsnew.sh "$VERSION" || true)
          if [ -n "$DIR" ] && [ -d "$DIR" ]; then
            echo "directory=$DIR" >> "$GITHUB_OUTPUT"
            echo "Prepared What's New files:"
            ls -la "$DIR"
          else
            echo "::warning::No Play Store release notes for v$VERSION - upload continues without whatsNewDirectory."
          fi

      - name: Download AAB artifact
        uses: actions/download-artifact@v4
        with:
          name: release-aab
          path: build/app/outputs/bundle/release/

      - name: Publish to internal track (with release notes)
        if: steps.whatsnew.outputs.directory != ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: app.halalscan
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal
          status: completed
          whatsNewDirectory: ${{ steps.whatsnew.outputs.directory }}

      - name: Publish to internal track
        if: steps.whatsnew.outputs.directory == ''
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: ${{ steps.auth.outputs.credentials_file_path }}
          packageName: app.halalscan
          releaseFiles: build/app/outputs/bundle/release/*.aab
          track: internal
          status: completed

      - name: Update latest_version in Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          VERSION="${{ needs.build-and-draft.outputs.version-name }}"
          curl -sS --fail-with-body -X PATCH \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"value\": \"$VERSION\"}" \
            "$SUPABASE_URL/rest/v1/app_config?key=eq.latest_version"
          echo "Set latest_version to $VERSION in Supabase."

  # ── Gate 2: Promote to closed testing ──────────────────────────────────────
  # Approve when internal testers have validated the build.
  promote-closed:
    needs: [build-and-draft, publish-internal]
    runs-on: ubuntu-latest
    environment: play/promote-closed
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Promote internal → closed testing
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')

          TRACK_JSON=$(curl -sS \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/alpha" \
            2>/dev/null || echo "{}")

          # If the track already has a build newer than VC, promoting would be a
          # downgrade — Play Store rejects it. Skip gracefully.
          HIGHER=$(echo "$TRACK_JSON" | jq -r --argjson vc "$VC" \
            '[.releases[]?.versionCodes[]? | tonumber | select(. > $vc)] | length' 2>/dev/null || echo "0")
          if [ "$HIGHER" -gt 0 ]; then
            echo "::warning::Alpha track already has builds newer than $VC — skipping promotion."
            exit 0
          fi

          # Include lower VCs so users on older builds still have an upgrade path.
          EXISTING=$(echo "$TRACK_JSON" | jq -r --argjson vc "$VC" \
            '[.releases[]?.versionCodes[]? | tonumber | select(. < $vc) | tostring] | unique | .[]' \
            2>/dev/null || true)
          VC_ARRAY="[\"$VC\""
          for v in $EXISTING; do VC_ARRAY="$VC_ARRAY,\"$v\""; done
          VC_ARRAY="$VC_ARRAY]"

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"releases\":[{\"versionCodes\":$VC_ARRAY,\"status\":\"completed\"}]}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/alpha")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 400 ]; then
            if echo "$BODY" | grep -q "FAILED_PRECONDITION"; then
              echo "::warning::Precondition check failed — the app is likely under review."
              echo "::warning::Re-run this workflow after Google Play review completes."
              echo "$BODY" | jq '.error.message' 2>/dev/null || echo "$BODY"
              exit 0
            fi
            echo "::error::Track update failed (HTTP $HTTP_CODE):"
            echo "$BODY"
            exit 1
          fi

          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT:commit"
          echo "Promoted release $VC to closed testing."

  # ── Gate 3: Publish closed testing release ─────────────────────────────────
  # Approve once Play Console shows the closed testing review has passed.
  # Managed publishing is on, so this gate publishes the approved alpha release.
  submit-review:
    needs: [build-and-draft, promote-closed]
    runs-on: ubuntu-latest
    environment: play/submit-review
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Publish approved closed testing release
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')

          TRACK_JSON=$(curl -sS \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/alpha" \
            2>/dev/null || echo "{}")

          HIGHER=$(echo "$TRACK_JSON" | jq -r --argjson vc "$VC" \
            '[.releases[]?.versionCodes[]? | tonumber | select(. > $vc)] | length' 2>/dev/null || echo "0")
          if [ "$HIGHER" -gt 0 ]; then
            echo "::warning::Alpha track already has builds newer than $VC — skipping."
            exit 0
          fi

          EXISTING=$(echo "$TRACK_JSON" | jq -r --argjson vc "$VC" \
            '[.releases[]?.versionCodes[]? | tonumber | select(. < $vc) | tostring] | unique | .[]' \
            2>/dev/null || true)
          VC_ARRAY="[\"$VC\""
          for v in $EXISTING; do VC_ARRAY="$VC_ARRAY,\"$v\""; done
          VC_ARRAY="$VC_ARRAY]"

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"releases\":[{\"versionCodes\":$VC_ARRAY,\"status\":\"completed\"}]}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/alpha")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 400 ]; then
            if echo "$BODY" | grep -q "FAILED_PRECONDITION"; then
              echo "::warning::Precondition check failed — the app is likely under review."
              echo "::warning::Re-run this workflow after Google Play review completes."
              echo "$BODY" | jq '.error.message' 2>/dev/null || echo "$BODY"
              exit 0
            fi
            echo "::error::Track update failed (HTTP $HTTP_CODE):"
            echo "$BODY"
            exit 1
          fi

          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT:commit"
          echo "Published closed testing release $VC."

  # ── Gate 4: Promote to open testing (test environment) ─────────────────────
  # Approve when closed testing is published and you're ready to push to open testing.
  publish-test:
    needs: [build-and-draft, submit-review]
    runs-on: ubuntu-latest
    environment: play/publish-test
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
          token_format: access_token
          access_token_scopes: https://www.googleapis.com/auth/androidpublisher

      - name: Promote closed testing → open testing
        env:
          TOKEN: ${{ steps.auth.outputs.access_token }}
          PKG: app.halalscan
          VC: ${{ needs.build-and-draft.outputs.version-code }}
        run: |
          set -euo pipefail
          EDIT=$(curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits" \
            | jq -r '.id')

          TRACK_JSON=$(curl -sS \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/beta" \
            2>/dev/null || echo "{}")

          HIGHER=$(echo "$TRACK_JSON" | jq -r --argjson vc "$VC" \
            '[.releases[]?.versionCodes[]? | tonumber | select(. > $vc)] | length' 2>/dev/null || echo "0")
          if [ "$HIGHER" -gt 0 ]; then
            echo "::warning::Beta track already has builds newer than $VC — skipping."
            exit 0
          fi

          EXISTING=$(echo "$TRACK_JSON" | jq -r --argjson vc "$VC" \
            '[.releases[]?.versionCodes[]? | tonumber | select(. < $vc) | tostring] | unique | .[]' \
            2>/dev/null || true)
          VC_ARRAY="[\"$VC\""
          for v in $EXISTING; do VC_ARRAY="$VC_ARRAY,\"$v\""; done
          VC_ARRAY="$VC_ARRAY]"

          RESPONSE=$(curl -sS -w "\n%{http_code}" -X PUT \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"releases\":[{\"versionCodes\":$VC_ARRAY,\"status\":\"completed\"}]}" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT/tracks/beta")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | sed '$d')

          if [ "$HTTP_CODE" -ge 400 ]; then
            if echo "$BODY" | grep -q "FAILED_PRECONDITION"; then
              echo "::warning::Precondition check failed — the app is likely under review."
              echo "::warning::Re-run this workflow after Google Play review completes."
              echo "$BODY" | jq '.error.message' 2>/dev/null || echo "$BODY"
              exit 0
            fi
            echo "::error::Track update failed (HTTP $HTTP_CODE):"
            echo "$BODY"
            exit 1
          fi

          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer $TOKEN" \
            "https://androidpublisher.googleapis.com/androidpublisher/v3/applications/$PKG/edits/$EDIT:commit"
          echo "Promoted release $VC to open testing."
