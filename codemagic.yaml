workflows:
  ios-release:
    name: iOS Internal Testing

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: app.halalscan

      vars:
        XCODE_WORKSPACE: "ios/Runner.xcworkspace"
        XCODE_SCHEME: "Runner"

      groups:
        - appstore_credentials

    scripts:

      - name: Clean Flutter project
        script: |
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Get Flutter packages
        script: |
          flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod repo update
          pod install
          cd ..

      - name: Set build number
        script: |
          agvtool new-version -all $CM_BUILD_NUMBER

      - name: Build IPA
        script: |
          flutter build ipa \
            --release \
            --build-number=$CM_BUILD_NUMBER \
            --export-options-plist=ios/Runner/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration

        submit_to_testflight: true

        beta_groups:
          - Internal Testers

        expire_build_submitted_for_review: true